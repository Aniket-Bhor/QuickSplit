<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartSplit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0, transparent 50%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-md w-full glass-card rounded-2xl p-8 space-y-8">
        <div class="text-center">
            <div class="flex justify-center mb-4">
                <img src="images/SmartSplit Logo.png" alt="SmartSplit Logo" class="h-12 w-auto">
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Welcome Back</h2>
            <p class="mt-2 text-slate-400">Sign in to manage your group expenses</p>
        </div>

        <form id="auth-form" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div id="name-container" class="hidden">
                    <label for="name" class="block text-sm font-medium text-slate-300">Full Name</label>
                    <input id="name" name="name" type="text" 
                        class="mt-1 block w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="Enter your full name">
                    <p id="name-error" class="mt-1 text-[10px] text-red-400 hidden"></p>
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-300">Email Address</label>
                    <input id="email" name="email" type="email" required 
                        class="mt-1 block w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="user@example.com">
                    <p id="email-error" class="mt-1 text-[10px] text-red-400 hidden"></p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                    <input id="password" name="password" type="password" required 
                        class="mt-1 block w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                    <p id="password-error" class="mt-1 text-[10px] text-red-400 hidden"></p>
                    <p id="password-help" class="mt-1 text-[10px] text-slate-500 hidden">Min 6 characters, at least 1 letter and 1 number</p>
                </div>
            </div>

            <div id="error-message" class="text-red-400 text-sm hidden text-center"></div>

            <div>
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                    Sign In
                </button>
            </div>
        </form>

        <div class="text-center">
            <button id="toggle-auth" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors">
                Don't have an account? Sign Up
            </button>
        </div>
    </div>

    <script type="module">
        import { auth, AUTH_REGEX } from './js/auth.js';

        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const errorMsg = document.getElementById('error-message');
        const nameContainer = document.getElementById('name-container');
        const passwordHelp = document.getElementById('password-help');
        const title = document.querySelector('h2');
        const subtitle = document.querySelector('p');

        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        const nameError = document.getElementById('name-error');
        const emailError = document.getElementById('email-error');
        const passwordError = document.getElementById('password-error');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            title.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            subtitle.textContent = isLogin ? 'Sign in to manage your group expenses' : 'Join SmartSplit and start splitting';
            submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            toggleBtn.textContent = isLogin ? "Don't have an account? Sign Up" : 'Already have an account? Sign In';
            
            nameContainer.classList.toggle('hidden', isLogin);
            passwordHelp.classList.toggle('hidden', isLogin);
            
            errorMsg.classList.add('hidden');
            clearErrors();
        });

        function clearErrors() {
            [nameError, emailError, passwordError].forEach(err => {
                err.textContent = '';
                err.classList.add('hidden');
            });
        }

        function validateForm() {
            clearErrors();
            let isValid = true;

            if (!isLogin) {
                const nameVal = nameInput.value.trim();
                if (nameVal.length < 2) {
                    nameError.textContent = 'Name must be at least 2 characters';
                    nameError.classList.remove('hidden');
                    isValid = false;
                } else if (!/^[A-Za-z\s]+$/.test(nameVal)) {
                    nameError.textContent = 'Name can only contain letters and spaces';
                    nameError.classList.remove('hidden');
                    isValid = false;
                }
            }

            const emailVal = emailInput.value.trim();
            if (!AUTH_REGEX.EMAIL.test(emailVal)) {
                emailError.textContent = 'Enter a valid email address';
                emailError.classList.remove('hidden');
                isValid = false;
            }

            if (!AUTH_REGEX.PASSWORD.test(passwordInput.value)) {
                passwordError.textContent = 'Password must be min 6 chars with 1 letter & 1 number';
                passwordError.classList.remove('hidden');
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!validateForm()) return;

            const name = nameInput.value;
            const email = emailInput.value;
            const password = passwordInput.value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin mr-2"></span> Processing...`;
            errorMsg.classList.add('hidden');

            try {
                if (isLogin) {
                    await auth.login(email, password);
                } else {
                    await auth.signup(name, email, password);
                }
                window.location.href = 'index.html';
            } catch (err) {
                console.error("Auth Error:", err);
                errorMsg.textContent = err.message || 'An error occurred. Please try again.';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            }
        });

        // If already authenticated, redirect to index
        if (auth.isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
