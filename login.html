<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartSplit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.1) 0, transparent 50%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-md w-full glass-card rounded-2xl p-8 space-y-8">
        <div class="text-center">
            <div class="flex justify-center mb-4">
                <img src="images/SmartSplit Logo.png" alt="SmartSplit Logo" class="h-12 w-auto">
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Welcome Back</h2>
            <p class="mt-2 text-slate-400">Sign in to manage your group expenses</p>
        </div>

        <form id="auth-form" class="mt-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300">Username</label>
                    <input id="username" name="username" type="text" required 
                        class="mt-1 block w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="Enter your username">
                    <p id="username-help" class="mt-1 text-[10px] text-slate-500 hidden">3-20 characters, alphanumeric or underscore</p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
                    <input id="password" name="password" type="password" required 
                        class="mt-1 block w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                    <p id="password-help" class="mt-1 text-[10px] text-slate-500 hidden">At least 6 characters, 1 letter and 1 number</p>
                </div>
            </div>

            <div id="error-message" class="text-red-400 text-sm hidden text-center"></div>

            <div>
                <button type="submit" id="submit-btn"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                    Sign In
                </button>
            </div>
        </form>

        <div class="text-center">
            <button id="toggle-auth" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors">
                Don't have an account? Sign Up
            </button>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';

        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const toggleBtn = document.getElementById('toggle-auth');
        const errorMsg = document.getElementById('error-message');
        const usernameHelp = document.getElementById('username-help');
        const passwordHelp = document.getElementById('password-help');
        const title = document.querySelector('h2');
        const subtitle = document.querySelector('p');

        let isLogin = true;

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            title.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            subtitle.textContent = isLogin ? 'Sign in to manage your group expenses' : 'Join SmartSplit and start splitting';
            submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            toggleBtn.textContent = isLogin ? "Don't have an account? Sign Up" : 'Already have an account? Sign In';
            
            usernameHelp.classList.toggle('hidden', isLogin);
            passwordHelp.classList.toggle('hidden', isLogin);
            errorMsg.classList.add('hidden');
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = form.username.value;
            const password = form.password.value;

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="w-4 h-4 border-2 border-white/20 border-t-white rounded-full animate-spin mr-2"></span> Processing...`;

            try {
                if (isLogin) {
                    await auth.login(username, password);
                } else {
                    await auth.signup(username, password);
                }
                window.location.href = 'index.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Sign In' : 'Sign Up';
            }
        });

        // If already authenticated, redirect to index
        if (auth.isAuthenticated()) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
